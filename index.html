<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corellia Cannabis Club | Imperiale Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="images/logo.png" alt="CCC Logo">
  <nav>
    <a href="#ranks">Ränge</a>
    <a href="#progress">Progress</a>
    <a href="#gallery">Galerie</a>
  </nav>
</header>

<section class="hero">
  <img src="images/logo.png" alt="Corellia Cannabis Club">
  <h1>Elite des Imperiums</h1>
  <p>Tulak Hord • Imperium • Deutsch</p>
</section>

<section class="section" id="ranks">
  <h2>Imperiale Rangstruktur</h2>
  <div class="rank">👑 Dunkler Rat</div>
  <div class="rank">⚔ Imperiale Offiziere</div>
  <div class="rank">🛡 Elite-Gardisten</div>
  <div class="rank">🔥 Kriegsveteranen</div>
  <div class="rank">🌱 Rekruten</div>
</section>

<section class="section" id="progress">
  <h2>Raid Progress</h2>
  <div class="progress-container">
    <p>Operation Alpha</p>
    <div class="progress-bar">
      <div class="progress-fill" data-progress="85%"></div>
    </div>
  </div>
</section>

<section class="section" id="gallery">
  <h2>Galerie</h2>
  <div class="gallery">
    <img src="images/gallery1.jpg" onclick="openLightbox(this.src)">
    <img src="images/gallery2.jpg" onclick="openLightbox(this.src)">
    <img src="images/gallery3.jpg" onclick="openLightbox(this.src)">
  </div>
</section>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<footer>© 2026 Corellia Cannabis Club – Tulak Hord</footer>

<script src="script.js"></script>
</body>
</html>
