<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corellia Cannabis Club | Imperiale Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* Animated Starfield */
body::before {
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    animation:moveStars 200s linear infinite;
    opacity:0.4;
    z-index:-1;
}

@keyframes moveStars {
    from {background-position:0 0;}
    to {background-position:10000px 5000px;}
}

header {
    position:fixed;
    width:100%;
    top:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    z-index:1000;
}

header img {height:50px;}

nav a {
    margin:0 15px;
    color:white;
    text-decoration:none;
    font-size:14px;
}

nav a:hover {color:#00ff88;}

.lang-btn {
    cursor:pointer;
    padding:5px 10px;
    border:1px solid #00ff88;
    border-radius:5px;
    font-size:12px;
}

.hero {
    margin-top:120px;
    text-align:center;
    padding:60px 20px;
}

.hero img {
    width:320px;
    filter: drop-shadow(0 0 25px #00ff88);
}

.hero h1 {
    font-size:42px;
    background:linear-gradient(90deg,#00ff88,#1aff00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.section {
    padding:80px 20px;
    text-align:center;
    max-width:1100px;
    margin:auto;
}

.section h2 {color:#00ff88; margin-bottom:30px;}

.card {
    background:rgba(20,20,20,0.9);
    padding:25px;
    margin:15px;
    border-radius:12px;
    border:1px solid #1f1f1f;
}

.grid {display:flex; flex-wrap:wrap; justify-content:center;}

/* Rank Structure */
.rank {
    margin:10px 0;
    padding:10px;
    border:1px solid #00ff88;
    border-radius:6px;
}

/* Progress Bars */
.progress-container {margin:15px 0;}
.progress-bar {
    background:#1f1f1f;
    border-radius:20px;
    overflow:hidden;
}
.progress-fill {
    height:20px;
    background:#00ff88;
}

/* Gallery */
.gallery img {
    width:300px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.gallery img:hover {transform:scale(1.05);}

footer {text-align:center; padding:30px; opacity:0.6;}
</style>
</head>
<body>

<header>
<img src="logo.png" alt="CCC Logo">
<nav>
<a href="#ranks">Ränge</a>
<a href="#progress">Progress</a>
<a href="#gallery">Galerie</a>
</nav>
<div class="lang-btn" onclick="toggleLang()">DE / EN</div>
</header>

<section class="hero">
<img src="logo.png" alt="Corellia Cannabis Club">
<h1>Elite des Imperiums</h1>
<p>Tulak Hord • Imperium • Deutsch</p>
</section>

<section class="section" id="ranks">
<h2>Imperiale Rangstruktur</h2>
<div class="rank">Dunkler Rat</div>
<div class="rank">Imperiale Offiziere</div>
<div class="rank">Elite-Gardisten</div>
<div class="rank">Kriegsveteranen</div>
<div class="rank">Rekruten</div>
</section>

<section class="section" id="progress">
<h2>Raid Progress</h2>
<div class="progress-container">
<p>Operation Alpha</p>
<div class="progress-bar"><div class="progress-fill" style="width:80%"></div></div>
</div>
<div class="progress-container">
<p>Operation Beta</p>
<div class="progress-bar"><div class="progress-fill" style="width:60%"></div></div>
</div>
</section>

<section class="section" id="gallery">
<h2>Galerie</h2>
<div class="gallery">
<img src="https://picsum.photos/400/250?1">
<img src="https://picsum.photos/400/250?2">
<img src="https://picsum.photos/400/250?3">
</div>
</section>

<footer>© 2026 Corellia Cannabis Club – Tulak Hord</footer>

<script>
let currentLang='de';
function toggleLang(){alert('Sprachsystem kann bei Bedarf erweitert werden');}
</script>

</body>
</html>
